<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小胡作图</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-inner">
        <!-- <span class="badge">Pure Frontend Mode</span> -->
        <h1>把一句想法，变成一张图。</h1>
        <!-- <p>直接从浏览器调用第三方接口。请自行承担密钥暴露风险。</p> -->

        <div class="access-card">
          <div class="field">
            <label for="apiKey">API Key</label>
            <input id="apiKey" class="input" type="password" placeholder="输入第三方接口的 API Key" autocomplete="off" />
            <p class="access-hint">已自动记住本机 API Key。不要在公共设备上使用。</p>
          </div>
          <div class="field">
            <label for="accessKey">访问码</label>
            <input id="accessKey" class="input" type="password" placeholder="可选，用来区分你的使用入口" autocomplete="off" />
          </div>
        </div>
      </div>
    </section>

    <section class="right">
      <section class="workspace">
        <div class="workspace-head">
          <div>
            <strong>生成结果</strong>
            <span>输入需求后，图片会显示在这里。</span>
          </div>
          <div class="tag">直连第三方接口</div>
        </div>

        <div id="chat" class="chat">
          <div id="empty" class="empty">
            <div class="empty-card">
              <strong>开始生成你的第一张图片</strong>
              <p>比如：一张高级感很强的青绿色海报，留白克制，光影柔和。</p>
            </div>
          </div>
        </div>
      </section>

      <section class="composer">
        <div class="option-grid">
          <div class="field option-field">
            <label for="sizeTrigger">尺寸</label>
            <div class="dropdown" data-dropdown>
              <input id="size" type="hidden" value="1024x1024" />
              <button id="sizeTrigger" class="dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="dropdown-copy">
                  <span class="dropdown-value">正方形</span>
                  <span class="dropdown-meta">1024 × 1024</span>
                </span>
              </button>
              <div class="dropdown-menu" role="listbox" aria-label="尺寸选择">
                <button class="dropdown-option is-selected" type="button" data-value="1024x1024" data-label="正方形" data-meta="1024 × 1024">
                  <span class="dropdown-option-title">正方形</span>
                  <span class="dropdown-option-meta">1024 × 1024</span>
                </button>
                <button class="dropdown-option" type="button" data-value="1536x1024" data-label="横版" data-meta="1536 × 1024">
                  <span class="dropdown-option-title">横版</span>
                  <span class="dropdown-option-meta">1536 × 1024</span>
                </button>
                <button class="dropdown-option" type="button" data-value="1024x1536" data-label="竖版" data-meta="1024 × 1536">
                  <span class="dropdown-option-title">竖版</span>
                  <span class="dropdown-option-meta">1024 × 1536</span>
                </button>
              </div>
            </div>
          </div>
          <div class="field option-field">
            <label for="styleTrigger">风格</label>
            <div class="dropdown" data-dropdown>
              <input id="stylePreset" type="hidden" value="auto" />
              <button id="styleTrigger" class="dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="dropdown-copy">
                  <span class="dropdown-value">不限定</span>
                  <span class="dropdown-meta">按描述自由生成</span>
                </span>
              </button>
              <div class="dropdown-menu" role="listbox" aria-label="风格选择">
                <button class="dropdown-option is-selected" type="button" data-value="auto" data-label="不限定" data-meta="按描述自由生成">
                  <span class="dropdown-option-title">不限定</span>
                  <span class="dropdown-option-meta">按描述自由生成</span>
                </button>
                <button class="dropdown-option" type="button" data-value="poster" data-label="高级海报" data-meta="克制排版，强视觉感">
                  <span class="dropdown-option-title">高级海报</span>
                  <span class="dropdown-option-meta">克制排版，强视觉感</span>
                </button>
                <button class="dropdown-option" type="button" data-value="photo" data-label="真实摄影" data-meta="自然光影，真实质感">
                  <span class="dropdown-option-title">真实摄影</span>
                  <span class="dropdown-option-meta">自然光影，真实质感</span>
                </button>
                <button class="dropdown-option" type="button" data-value="illustration" data-label="精致插画" data-meta="色彩统一，细节完整">
                  <span class="dropdown-option-title">精致插画</span>
                  <span class="dropdown-option-meta">色彩统一，细节完整</span>
                </button>
                <button class="dropdown-option" type="button" data-value="cinematic" data-label="电影感" data-meta="戏剧光影，氛围更强">
                  <span class="dropdown-option-title">电影感</span>
                  <span class="dropdown-option-meta">戏剧光影，氛围更强</span>
                </button>
                <button class="dropdown-option" type="button" data-value="minimalist" data-label="极简留白" data-meta="元素精简，气质干净">
                  <span class="dropdown-option-title">极简留白</span>
                  <span class="dropdown-option-meta">元素精简，气质干净</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <textarea id="prompt" class="prompt" placeholder="描述你想生成的画面..." aria-label="图片描述"></textarea>
        <div class="composer-bar">
          <div class="composer-tip mobile-hidden">Ctrl + Enter / Cmd + Enter 快速发送</div>
          <div class="actions">
            <button id="clearBtn" class="secondary" type="button">清空</button>
            <button id="sendBtn" class="primary" type="button">开始生成</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div id="previewModal" class="preview-modal" hidden>
    <div class="preview-backdrop" data-preview-close></div>
    <div class="preview-panel" role="dialog" aria-modal="true" aria-label="图片预览">
      <button id="previewClose" class="preview-close" type="button" aria-label="关闭预览">×</button>
      <div class="preview-image-wrap">
        <img id="previewImage" class="preview-image" alt="preview image" />
      </div>
      <div class="preview-actions">
        <span id="previewHint" class="preview-hint"></span>
        <a id="previewOpenLink" class="preview-link" href="#" target="_blank" rel="noopener">打开原图</a>
      </div>
    </div>
  </div>
  <script src="./js/storage.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
