<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小胡作图</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #15202b;
      --muted: #6b7a89;
      --line: rgba(21, 32, 43, 0.08);
      --panel: rgba(255, 255, 255, 0.8);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --accent: #0f766e;
      --accent-2: #14b8a6;
      --assistant: #eff9f7;
      --loading: #eef5ff;
      --shadow: 0 32px 80px rgba(25, 42, 62, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, rgba(20, 184, 166, 0.16), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(37, 99, 235, 0.14), transparent 26%),
        radial-gradient(circle at 76% 76%, rgba(15, 118, 110, 0.12), transparent 22%),
        linear-gradient(180deg, #f9fbff 0%, #f2f5f9 100%);
    }

    body {
      padding: 20px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
      opacity: 0.5;
    }

    body::before {
      top: 40px;
      left: -40px;
      width: 260px;
      height: 260px;
      background: rgba(20, 184, 166, 0.18);
      border-radius: 50%;
    }

    body::after {
      right: -80px;
      bottom: 60px;
      width: 320px;
      height: 320px;
      background: rgba(37, 99, 235, 0.14);
      border-radius: 50%;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 0.92fr 1.18fr;
      gap: 18px;
      min-height: calc(100vh - 40px);
    }

    .hero,
    .workspace,
    .composer {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      border-radius: 34px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -80px;
      right: -40px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.22), transparent 62%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 20px;
      bottom: -100px;
      width: 320px;
      height: 220px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.12), transparent 68%);
      pointer-events: none;
    }

    .hero-inner { position: relative; z-index: 1; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.12);
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(36px, 5vw, 62px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .hero p {
      margin: 0;
      max-width: 420px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .access-card {
      margin-top: 20px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(21, 32, 43, 0.06);
    }

    .field { margin-top: 14px; }
    .field:first-child { margin-top: 0; }

    .field label {
      display: block;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      outline: none;
      font: inherit;
      color: inherit;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .access-hint {
      margin: 10px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .input:focus,
    .prompt:focus {
      border-color: rgba(15, 118, 110, 0.4);
      box-shadow: 0 0 0 5px rgba(15, 118, 110, 0.1);
    }

    .input:disabled,
    .prompt:disabled {
      opacity: 0.68;
      cursor: not-allowed;
      background: #f4f6f9;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .workspace {
      border-radius: 34px;
      padding: 18px;
      flex: 1;
      min-height: 0;
    }

    .workspace-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 4px 16px;
    }

    .workspace-head strong { font-size: 18px; }
    .workspace-head span {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .tag {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: #1d4ed8;
      font-size: 12px;
    }

    .chat {
      min-height: 520px;
      max-height: calc(100vh - 270px);
      overflow-y: auto;
      padding: 8px 4px 2px;
      scroll-behavior: smooth;
    }

    .empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .empty-card {
      width: min(500px, 100%);
      padding: 30px 26px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(240,248,247,0.92));
      border: 1px solid rgba(15, 118, 110, 0.08);
      text-align: center;
    }

    .empty-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .empty-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: rise 180ms ease-out;
    }

    .message.user { justify-content: flex-end; }

    .bubble {
      max-width: min(78%, 720px);
      padding: 14px 16px;
      border-radius: 22px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .assistant .bubble {
      background: var(--assistant);
      border-bottom-left-radius: 8px;
    }

    .user .bubble {
      background: linear-gradient(135deg, #11998e 0%, #0f766e 100%);
      color: #f7fffe;
      border-bottom-right-radius: 8px;
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.18);
    }

    .message.loading .bubble {
      background: var(--loading);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #315270;
    }

    .dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }

    .card {
      margin-top: 12px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
    }

    .card img {
      width: 100%;
      display: block;
      border-radius: 14px;
      -webkit-user-drag: none;
      user-select: none;
    }

    .image-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .save-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      background: #eef2f6;
      color: #35506f;
      text-decoration: none;
      font-size: 13px;
    }

    .save-link:hover { background: #e6ecf2; }

    .composer {
      border-radius: 30px;
      padding: 16px;
    }

    .prompt {
      width: 100%;
      min-height: 124px;
      resize: none;
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      outline: none;
      font: inherit;
      color: inherit;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .composer-bar {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .composer-tip {
      font-size: 13px;
      color: var(--muted);
    }

    .composer-tip.mobile-hidden { display: inline; }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 18px;
      height: 50px;
      padding: 0 20px;
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary {
      background: #eef2f6;
      color: #425363;
    }

    .primary {
      min-width: 140px;
      background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 16px 28px rgba(15, 118, 110, 0.2);
    }

    .primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #17c7b4 0%, #0f766e 100%);
      box-shadow: 0 18px 30px rgba(15, 118, 110, 0.24);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.35; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 980px) {
      body { padding: 12px; }
      .app {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .hero, .workspace, .composer { border-radius: 28px; }
      .chat {
        max-height: none;
        min-height: 420px;
      }
    }

    @media (max-width: 640px) {
      body { padding: 0; }
      .app {
        width: 100%;
        gap: 0;
        min-height: 100vh;
        min-height: 100svh;
      }
      .hero, .workspace, .composer {
        border-radius: 0;
        box-shadow: none;
      }
      .hero, .workspace, .composer {
        padding-left: 16px;
        padding-right: 16px;
      }
      .hero { padding-top: 22px; padding-bottom: 22px; }
      .workspace { padding-top: 16px; padding-bottom: 16px; }
      .composer { padding-top: 14px; padding-bottom: 14px; }
      h1 { font-size: 22px; }
      .workspace-head, .composer-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .actions { width: 100%; }
      .actions button { flex: 1; }
      .bubble { max-width: 88%; }
      .composer-tip.mobile-hidden { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-inner">
        <!-- <span class="badge">Pure Frontend Mode</span> -->
        <h1>把一句想法，变成一张图。</h1>
        <!-- <p>直接从浏览器调用第三方接口。请自行承担密钥暴露风险。</p> -->

        <div class="access-card">
          <div class="field">
            <label for="apiKey">API Key</label>
            <input id="apiKey" class="input" type="password" placeholder="输入第三方接口的 API Key" autocomplete="off" />
            <p class="access-hint">已自动记住本机 API Key。不要在公共设备上使用。</p>
          </div>
          <div class="field">
            <label for="accessKey">访问码</label>
            <input id="accessKey" class="input" type="password" placeholder="可选，用来区分你的使用入口" autocomplete="off" />
          </div>
        </div>
      </div>
    </section>

    <section class="right">
      <section class="workspace">
        <div class="workspace-head">
          <div>
            <strong>生成结果</strong>
            <span>输入需求后，图片会显示在这里。</span>
          </div>
          <div class="tag">直连第三方接口</div>
        </div>

        <div id="chat" class="chat">
          <div id="empty" class="empty">
            <div class="empty-card">
              <strong>开始生成你的第一张图片</strong>
              <p>比如：一张高级感很强的青绿色海报，留白克制，光影柔和。</p>
            </div>
          </div>
        </div>
      </section>

      <section class="composer">
        <textarea id="prompt" class="prompt" placeholder="描述你想生成的画面..."></textarea>
        <div class="composer-bar">
          <div class="composer-tip mobile-hidden">Ctrl + Enter / Cmd + Enter 快速发送</div>
          <div class="actions">
            <button id="clearBtn" class="secondary" type="button">清空</button>
            <button id="sendBtn" class="primary" type="button">开始生成</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://api.zectai.com/v1";
    const IMAGE_ENDPOINT = `${API_BASE_URL}/images/generations`;
    const IMAGE_MODEL = "gpt-image-2";
    const API_KEY_STORAGE_KEY = "img_plus_api_key";
    const ACCESS_KEY_STORAGE_KEY = "img_plus_access_key";
    const messages = [];

    const chatEl = document.getElementById("chat");
    const emptyEl = document.getElementById("empty");
    const promptEl = document.getElementById("prompt");
    const apiKeyEl = document.getElementById("apiKey");
    const accessKeyEl = document.getElementById("accessKey");
    const sendBtnEl = document.getElementById("sendBtn");
    const clearBtnEl = document.getElementById("clearBtn");
    let loadingEl = null;

    function loadLocalValues() {
      apiKeyEl.value = window.localStorage.getItem(API_KEY_STORAGE_KEY) || "";
      accessKeyEl.value = window.localStorage.getItem(ACCESS_KEY_STORAGE_KEY) || "";
    }

    function persistInput(inputEl, key) {
      const value = inputEl.value.trim();
      if (value) {
        window.localStorage.setItem(key, value);
      } else {
        window.localStorage.removeItem(key);
      }
    }

    function hideEmpty() {
      if (emptyEl) {
        emptyEl.style.display = "none";
      }
    }

    function buildImageCard(imageUrl) {
      const cardEl = document.createElement("div");
      cardEl.className = "card";

      const imgEl = document.createElement("img");
      imgEl.src = imageUrl;
      imgEl.alt = "generated image";
      imgEl.loading = "lazy";
      cardEl.appendChild(imgEl);

      const actionsEl = document.createElement("div");
      actionsEl.className = "image-actions";

      const saveLinkEl = document.createElement("a");
      saveLinkEl.className = "save-link";
      saveLinkEl.href = imageUrl;
      saveLinkEl.download = `generated-${Date.now()}.png`;
      saveLinkEl.target = "_blank";
      saveLinkEl.rel = "noopener";
      saveLinkEl.textContent = "保存图片";
      actionsEl.appendChild(saveLinkEl);

      cardEl.appendChild(actionsEl);
      return cardEl;
    }

    function appendMessage(role, text, imageUrl) {
      hideEmpty();
      const itemEl = document.createElement("div");
      itemEl.className = `message ${role}`;

      const bubbleEl = document.createElement("div");
      bubbleEl.className = "bubble";
      bubbleEl.textContent = text || "";
      itemEl.appendChild(bubbleEl);

      if (imageUrl) {
        bubbleEl.appendChild(buildImageCard(imageUrl));
      }

      chatEl.appendChild(itemEl);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function showLoading() {
      hideEmpty();
      setFormDisabled(true);
      loadingEl = document.createElement("div");
      loadingEl.className = "message assistant loading";
      loadingEl.innerHTML = `
        <div class="bubble">
          <div class="dots"><span></span><span></span><span></span></div>
          <span>生成中，请稍候...</span>
        </div>
      `;
      chatEl.appendChild(loadingEl);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideLoading() {
      if (loadingEl && loadingEl.parentNode) {
        loadingEl.parentNode.removeChild(loadingEl);
      }
      loadingEl = null;
      setFormDisabled(false);
    }

    function setFormDisabled(disabled) {
      promptEl.disabled = disabled;
      apiKeyEl.disabled = disabled;
      accessKeyEl.disabled = disabled;
      sendBtnEl.disabled = disabled;
      clearBtnEl.disabled = disabled;
      sendBtnEl.textContent = disabled ? "生成中..." : "开始生成";
      if (!disabled) {
        promptEl.focus();
      }
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      const apiKey = apiKeyEl.value.trim();
      const accessKey = accessKeyEl.value.trim();

      if (!apiKey) {
        appendMessage("assistant", "请先输入 API Key。");
        apiKeyEl.focus();
        return;
      }

      if (!text || sendBtnEl.disabled) {
        return;
      }

      persistInput(apiKeyEl, API_KEY_STORAGE_KEY);
      persistInput(accessKeyEl, ACCESS_KEY_STORAGE_KEY);

      messages.push({ role: "user", content: text });
      appendMessage("user", text);
      promptEl.value = "";
      showLoading();

      try {
        const response = await fetch(IMAGE_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: IMAGE_MODEL,
            prompt: text,
            size: "1024x1024"
          })
        });

        const result = await response.json();

        if (!response.ok) {
          const errorMessage = result?.error?.message || result?.message || "request failed";
          throw new Error(errorMessage);
        }

        const base64Data = result?.data?.[0]?.b64_json;
        if (!base64Data) {
          throw new Error("接口未返回图片数据。");
        }

        const imageUrl = `data:image/png;base64,${base64Data}`;
        const assistantText = accessKey ? `图片已生成。` : `图片已生成。`;
        messages.push({ role: "assistant", content: assistantText });
        appendMessage("assistant", assistantText, imageUrl);
      } catch (error) {
        appendMessage("assistant", `请求失败：${error.message}`);
      } finally {
        hideLoading();
      }
    }

    apiKeyEl.addEventListener("change", () => persistInput(apiKeyEl, API_KEY_STORAGE_KEY));
    apiKeyEl.addEventListener("blur", () => persistInput(apiKeyEl, API_KEY_STORAGE_KEY));
    accessKeyEl.addEventListener("change", () => persistInput(accessKeyEl, ACCESS_KEY_STORAGE_KEY));
    accessKeyEl.addEventListener("blur", () => persistInput(accessKeyEl, ACCESS_KEY_STORAGE_KEY));
    sendBtnEl.addEventListener("click", sendMessage);
    clearBtnEl.addEventListener("click", () => {
      if (sendBtnEl.disabled) {
        return;
      }
      messages.splice(0);
      chatEl.innerHTML = "";
      emptyEl.style.display = "block";
      chatEl.appendChild(emptyEl);
      promptEl.value = "";
      promptEl.focus();
    });
    promptEl.addEventListener("keydown", (event) => {
      if (sendBtnEl.disabled) {
        event.preventDefault();
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        sendMessage();
      }
    });

    loadLocalValues();
  </script>
</body>
</html>
